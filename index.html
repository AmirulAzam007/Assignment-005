<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- daisyui + tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    
    <section class="min-h-screen flex items-center justify-center">
        <div class="min-h-[80vh] w-full max-w-md bg-base-200 mx-auto shadow-2xl rounded-xl">

            <div class="logo flex flex-col justify-center items-center pt-10">
                <img src="./assets/github-logo.png" alt="">
                <h1 class="font-bold text-2xl pt-2 pb-1">GitHub Issues Tracker</h1>
                <p class="text-black-1200">Sign in to manage your issues</p>
            </div>

            <div class="form pt-7">
            <div class="card bg-base-200 w-full max-w-sm shrink-0  mx-auto">
            <div class="card-body">
        <fieldset class="fieldset">
          <label class="label">Username</label>
          <input id="usernameIn" type="text" class="input" placeholder="Enter Username" />
          <label class="label">Password</label>
          <input id="pass" type="password" class="input" placeholder=" Enter Password" />
          <div><a class="link link-hover">Forgot password?</a></div>
          <button id="lgn-btn" class="btn btn-primary mt-4">Sign in</button>
        </fieldset>
      </div>
    </div>
            </div>

        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>

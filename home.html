<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- daisyui + tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>


  
    <section class="navbar">

<div class="navbar bg-base-100 shadow-sm">
  <div class="flex-1">
    <div class="flex items-center">
    <img class="w-10" src="./assets/github-logo.png" alt="">
    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
    </div>
  </div>
  <div class="flex gap-2">
    
  <div class="join">
  <div>
    <label class="input validator join-item">
      <input id="inputSearch" type="text" placeholder="Search Issues..." required />
    </label>
  </div>
  <button id="btnSearch" class="btn btn-neutral join-item">Search</button>
</div>


    <button class="btn btn-primary font-bold">+ New Issue</button>
  </div>
</div>

    </section>

    <section class="buttons p-5 mt-10 mb-5 w-4/5 flex bg-gray-200 mx-auto rounded-md shadow-lg">

        <div>
            <button onclick="togglekorbe('allbtn'); statuscheck('all')" id="allbtn" class="btn bg-indigo-700 text-white px-8">All</button>
            <button onclick="togglekorbe('openbtn'); statuscheck('open')" id="openbtn" class="btn bg-gray-100 px-6">Open</button>
            <button onclick="togglekorbe('closebtn'); statuscheck('closed')" id="closebtn" class="btn bg-gray-100 px-6">Closed</button>
        </div>

    </section>

    <section class="cardbox p-5 w-4/5 bg-gray-200 mx-auto shadow-lg">

      <div class="cardfirst flex justify-between">
        <div class="flex gap-2 items-center">
          <div class="img">
          <img src="./assets/Aperture.png" alt="">
        </div>
        <div>
          <p class="font-bold text-lg"><span id="alltotal">0</span> Issues</p>

          <p>Track and manage your project issues</p>
        </div>
        </div>

        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-green-500 rounded-full"></div>
          <p>Open</p>
          <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
          <p>Close</p>
        </div>

      </div>

      <hr class="my-10 border-gray-300 w-full" />

      <!-- Load Spinner -->
        <div id="loadspinner" class=" hidden flex justify-center items-center ">
          <span class="loading loading-spinner loading-xl"></span>
        </div>

      <div id="cardcontainer" class="cards grid grid-cols-3">


        

      </div>


    </section>

    <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box ">
    
    <div id="detailContainer" class="space-y-3">
      

    </div>


    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>


    <script src="home.js"></script>
</body>
</html>
